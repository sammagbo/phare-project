<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Connexion — pHARe</title>
<link rel="manifest" href="manifest.json">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<link rel="apple-touch-icon" href="icons/apple-touch-icon.png">
<meta name="theme-color" content="#0a2d1d">
<link rel="stylesheet" href="css/index.css">
<style>
  body {
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    padding: 2rem;
    background: linear-gradient(135deg, #0a2d1d 0%, #1a5632 100%);
  }

  .login-container {
    width: 100%;
    max-width: 420px;
    padding: 3rem;
    background: rgba(255, 255, 255, 0.95);
    backdrop-filter: blur(20px);
    border-radius: var(--radius-lg);
    box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
    animation: revealUp 0.8s var(--ease-out) both;
  }

  @keyframes revealUp {
    from { opacity: 0; transform: translateY(30px); }
    to { opacity: 1; transform: translateY(0); }
  }

  header {
    text-align: center;
    margin-bottom: 2.5rem;
  }

  header h1 {
    font-size: 2.5rem;
    color: var(--primary);
    margin-bottom: 0.5rem;
  }

  header p {
    color: var(--text-muted);
    font-weight: 500;
  }

  .btn-login {
    width: 100%;
    margin-top: 1.5rem;
    height: 3.5rem;
    font-size: 1rem;
  }

  .error-box {
    background: var(--accent-light);
    color: var(--accent);
    padding: 1rem;
    border-radius: var(--radius-md);
    border: 1px solid var(--accent);
    margin-bottom: 2rem;
    font-weight: 600;
    text-align: center;
    display: none;
  }
</style>
</head>
<body>

<div class="login-container">
  <header>
    <h1>pHARe</h1>
    <p>Portail de gestion académique</p>
  </header>

  <div id="error-message" class="error-box">Identifiants incorrects</div>

  <form id="login-form">
    <div class="field-group">
      <label for="email">Identifiant professionnel</label>
      <input type="email" id="email" placeholder="nom@education.fr" required autofocus>
    </div>

    <div class="field-group">
      <label for="password">Mot de passe</label>
      <input type="password" id="password" placeholder="••••••••" required>
    </div>

    <button type="submit" class="btn btn-primary btn-login" id="submit-btn">Entrer dans le système</button>
  </form>

  <footer style="margin-top: 3rem; text-align: center; font-size: 0.8rem; color: var(--text-muted); font-weight: 500;">
    &copy; 2026 Programme pHARe — Ministère de l'Éducation
  </footer>
</div>

<script type="module" src="js/login.js"></script>
<script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('./sw.js')
          .then(reg => console.log('SW Registered', reg))
          .catch(err => console.error('SW Registration Failed', err));
      });
    }
</script>
</body>
</html>
