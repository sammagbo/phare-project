<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>pHARe — Gestion de cas de harcèlement</title>
<link rel="manifest" href="manifest.json">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<link rel="apple-touch-icon" href="icons/apple-touch-icon.png">
<meta name="theme-color" content="#0a2d1d">
<script type="module">
  import { checkAuth } from './js/auth.js';
  checkAuth();
</script>
<link rel="stylesheet" href="css/index.css">
<style>
  /* ── Page Specific Overrides ── */
  .actions { 
    display: flex; flex-wrap: wrap; gap: 0.75rem; 
    margin: 2.5rem 0; padding: 2rem; 
    background: var(--primary-light);
    border-radius: var(--radius-md);
    justify-content: center;
  }
  
  .search-bar {
    display: flex; gap: 1rem; align-items: center;
    margin-bottom: 2rem;
  }
  
  .search-bar input { flex: 1; }
  
  .history-list {
    display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
    gap: 1.5rem;
  }

  .modal-overlay {
    position: fixed; inset: 0; background: rgba(0,0,0,0.5);
    display: none; align-items: center; justify-content: center;
    z-index: 1000; backdrop-filter: blur(8px);
  }
  .modal-overlay.active { display: flex; }
  
  .edit-banner {
    display: none; align-items: center; justify-content: space-between;
    padding: 1.25rem 2rem; background: var(--primary);
    color: #fff; font-weight: 700; border-radius: var(--radius-md);
    margin-bottom: 2rem; box-shadow: var(--shadow-lg);
  }
  .edit-banner.visible { display: flex; }

  .role-chip {
    padding: 0.5rem 1rem; border-radius: 30px;
    font-size: 0.8rem; font-weight: 700;
    border: 2px solid currentColor;
    opacity: 0.4; transition: all 0.3s;
  }
  .role-chip.met { opacity: 1; transform: scale(1.05); background: currentColor; color: #fff; }
  
  /* Role specific colors for gestion page */
  .chip-victime { color: var(--victime); }
  .chip-temoin { color: var(--temoin); }
  .chip-intimidateur { color: var(--intimidateur); }
</style>
</head>
<body>

<div class="container animate-reveal">
  <!-- Navigation -->
  <nav class="top-nav glass">
    <a class="nav-link active" href="phare-gestion-harcelement.html">📋 Gestion</a>
    <a class="nav-link" href="phare-reunion.html">📅 Réunion</a>
    <a class="nav-link" href="#" id="logout-btn">🚪 Déconnexion</a>
  </nav>

  <script type="module">
    import { logoutUser } from './js/auth.js';
    document.getElementById('logout-btn').addEventListener('click', (e) => {
      e.preventDefault();
      logoutUser();
    });
  </script>

  <header>
    <h1>Projet pHARe</h1>
    <p>Gestion des cas de harcèlement scolaire</p>
    <div id="api-status-container">
        <span class="badge api-badge offline" id="api-status">⏳ Connexion…</span>
    </div>
  </header>

  <!-- Champs globaux -->
  <div class="global-fields card" style="margin-bottom: 2rem; display: flex; gap: 1.5rem;">
    <div class="field-group" style="flex: 1; margin-bottom: 0;">
      <label for="date">Date de l'incident</label>
      <input type="date" id="date">
      <div class="field-error" id="error-date" style="color: var(--accent); font-size: 0.8rem; margin-top: 0.25rem; display: none;">Veuillez renseigner la date.</div>
    </div>
    <div class="field-group" style="flex: 1; margin-bottom: 0;">
      <label for="heure">Heure approximative</label>
      <input type="time" id="heure">
      <div class="field-error" id="error-heure" style="color: var(--accent); font-size: 0.8rem; margin-top: 0.25rem; display: none;">Veuillez renseigner l'heure.</div>
    </div>
  </div>

  <!-- Résumé des erreurs -->
  <div class="error-summary card" id="error-summary" style="display: none; background: var(--accent-light); border-color: var(--accent); color: var(--accent); margin-bottom: 1.5rem;"></div>

  <!-- Bannière mode édition -->
  <div class="edit-banner" id="edit-banner">
    <span>✍️ Modification du cas en cours…</span>
    <button class="btn btn-ghost" data-action="cancel-edit" style="color: #fff; border-color: rgba(255,255,255,0.5);">Annuler</button>
  </div>

  <!-- Indicateurs de rôles -->
  <div class="role-hint" id="role-hint" style="display:none; margin-bottom: 1.5rem; display: flex; gap: 0.75rem; align-items: center;">
    <span style="font-size: 0.8rem; font-weight: 700; color: var(--text-muted);">Requis :</span>
    <span class="role-chip chip-victime" id="chip-victime">🔴 Victime</span>
    <span style="font-size: 0.8rem; font-weight: 700; color: var(--text-muted); margin-left: 0.5rem;">Optionnel :</span>
    <span class="role-chip chip-temoin" id="chip-temoin">🟡 Témoin</span>
    <span class="role-chip chip-intimidateur" id="chip-intimidateur">🟣 Intimidateur</span>
  </div>

  <!-- Liste des élèves -->
  <div id="students-list" style="display: flex; flex-direction: column; gap: 1rem;"></div>

  <!-- Boutons -->
  <div class="actions glass">
    <button class="btn btn-ghost" data-action="add-student">＋ Ajouter un élève</button>
    <button class="btn btn-primary" data-action="save-case">💾 Enregistrer le cas</button>
    <button class="btn btn-ghost" data-action="import-json">📂 Importer</button>
    <input type="file" id="import-file" style="display:none" accept=".json">
    <button class="btn btn-ghost" data-action="open-members">👥 Équipe</button>
    <button class="btn btn-ghost" data-action="export-json">📄 Exporter</button>
    <button class="btn btn-ghost" data-action="print-report">🖨️ Imprimer</button>
  </div>

  <!-- Historique -->
  <h2 style="margin: 3rem 0 1.5rem; color: var(--primary);">Historique des dossiers</h2>
  <div class="search-bar card">
    <input type="text" id="search-input" placeholder="Rechercher un élève par nom…">
    <span class="badge" id="search-count" style="background: var(--primary-light); color: var(--primary);"></span>
  </div>
  <div id="history-list" class="history-list"></div>
</div>

<div class="toast" id="toast"></div>

<!-- Modal Gestion des Membres -->
<div class="modal-overlay" id="member-modal">
  <div class="card" style="width: 100%; max-width: 450px; padding: 2rem;">
    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 2rem;">
      <h2 style="color: var(--primary);">Équipe pHARe</h2>
      <button class="btn" data-action="close-members" style="background: none; font-size: 1.5rem; color: var(--text-muted);">✕</button>
    </div>
    
    <div class="field-group">
      <label for="new-member-name">Ajouter un membre</label>
      <div style="display: flex; gap: 0.5rem;">
        <input type="text" id="new-member-name" placeholder="Nom et Prénom..." style="flex: 1;">
        <button class="btn btn-primary" data-action="add-member">Ajouter</button>
      </div>
    </div>

    <div id="member-list-items" style="max-height: 300px; overflow-y: auto; display: flex; flex-direction: column; gap: 0.5rem;">
      <!-- Rempli en JS -->
    </div>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
<script type="module" src="js/ui.js"></script>
<script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('./sw.js')
          .then(reg => console.log('SW Registered', reg))
          .catch(err => console.error('SW Registration Failed', err));
      });
    }
</script>
</body>
</html>
