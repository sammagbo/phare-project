<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>pHARe — Réunion d'attribution des entretiens</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&family=Fraunces:opsz,wght@9..144,700&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #f4f1ec;
    --card: #ffffff;
    --primary: #1a5632;
    --primary-hover: #14442a;
    --primary-light: #e8f0eb;
    --accent: #c0392b;
    --accent-light: #fdf0ee;
    --cible: #c0392b;
    --cible-bg: #fdecea;
    --cible-border: #f5c6cb;
    --temoin: #b7950b;
    --temoin-bg: #fef9e7;
    --temoin-border: #f0e199;
    --pi: #6c2d8b;
    --pi-bg: #f0e0f7;
    --pi-border: #d5b8e8;
    --text: #2c2c2c;
    --text-light: #6b6b6b;
    --border: #ddd5ca;
    --shadow: 0 2px 12px rgba(0,0,0,.06);
    --radius: 10px;
  }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    padding: 1.5rem 1rem 4rem;
  }

  .container { max-width: 960px; margin: 0 auto; }

  /* ── Header ── */
  header { text-align: center; margin-bottom: 1.5rem; }
  header h1 {
    font-family: 'Fraunces', serif;
    font-size: 1.8rem;
    color: var(--primary);
    letter-spacing: -.5px;
  }
  header p { color: var(--text-light); margin-top: .3rem; font-size: .9rem; }
  .api-badge {
    display: inline-block; margin-top: .4rem;
    font-size: .7rem; font-weight: 600; padding: .2rem .6rem;
    border-radius: 20px; letter-spacing: .3px;
  }
  .api-badge.online  { background: var(--primary-light); color: var(--primary); }
  .api-badge.offline { background: var(--accent-light); color: var(--accent); }

  /* ── Info bar ── */
  .info-bar {
    display: flex; gap: 1rem; margin-bottom: 1.25rem;
    flex-wrap: wrap; align-items: end;
  }
  .info-bar .field { display: flex; flex-direction: column; gap: .3rem; }
  .info-bar .field-label {
    font-size: .72rem; font-weight: 700; color: var(--text);
    text-transform: uppercase; letter-spacing: .5px;
  }
  .info-bar input, .info-bar select {
    padding: .5rem .65rem;
    border: 1.5px solid var(--border); border-radius: 8px;
    font-family: inherit; font-size: .85rem;
    background: var(--card); transition: border-color .2s;
  }
  .info-bar input:focus, .info-bar select:focus { outline: none; border-color: var(--primary); }

  /* ── Case Cards ── */
  #table-body { display: none; } /* Hide old table body logic */
  .cases-list { display: flex; flex-direction: column; gap: 1.25rem; }
  .case-card {
    background: var(--card);
    border: 1.5px solid var(--border);
    border-radius: var(--radius);
    box-shadow: var(--shadow);
    overflow: hidden;
    animation: fadeIn .3s ease;
  }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
  
  .case-header {
    background: #fcfbf9;
    padding: .6rem 1rem;
    border-bottom: 1px solid var(--border);
    display: flex; justify-content: space-between; align-items: center;
  }
  .case-title { font-family: 'Fraunces', serif; font-size: .95rem; color: var(--primary); font-weight: 700; }
  .case-meta { display: flex; gap: .75rem; align-items: center; }
  .case-meta input { padding: .35rem .6rem; border: 1px solid var(--border); border-radius: 6px; font-size: .8rem; }

  .case-body { padding: 0; }
  .row-student {
    display: grid;
    grid-template-columns: 140px 1fr 1fr 130px 95px 40px;
    gap: .5rem;
    padding: .6rem .75rem;
    align-items: center;
    border-bottom: 1px solid #f8f6f2;
  }
  .row-student:last-child { border-bottom: none; }
  
  .row-student.cible { background: #fff9f8; border-left: 4px solid var(--cible); }
  .row-student.temoin { background: #fffdf5; border-left: 4px solid var(--temoin); }
  .row-student.pi { background: #fdfbff; border-left: 4px solid var(--pi); }

  .row-student select, .row-student input {
    padding: .45rem .6rem; border: 1.5px solid transparent; border-radius: 6px;
    font-size: .85rem; background: #fafaf8; transition: all .15s;
  }
  .row-student select:focus, .row-student input:focus {
    outline: none; border-color: var(--primary); background: #fff;
  }

  /* ── Buttons ── */
  .actions { margin-top: 1.5rem; display: flex; gap: .6rem; flex-wrap: wrap; justify-content: center; }
  .btn {
    display: inline-flex; align-items: center; gap: .4rem;
    padding: .65rem 1.2rem; border: none; border-radius: 8px;
    font-family: inherit; font-size: .85rem; font-weight: 600;
    cursor: pointer; transition: background .2s, transform .12s;
  }
  .btn:active { transform: scale(.97); }
  .btn-primary { background: var(--primary); color: #fff; }
  .btn-primary:hover { background: var(--primary-hover); }
  .btn-outline { background: var(--card); color: var(--primary); border: 1.5px solid var(--primary); }
  .btn-outline:hover { background: var(--primary-light); }
  .btn-ghost { background: var(--card); color: var(--text); border: 1.5px solid var(--border); }
  .btn-ghost:hover { background: #eee8e0; }

  .btn-add-item {
    font-size: .75rem; padding: .3rem .7rem; background: var(--primary-light); color: var(--primary);
    border: none; border-radius: 6px; cursor: pointer; font-weight: 700; margin: .5rem 1rem;
  }
  .btn-add-item:hover { background: #d0e4d6; }

  .btn-case-delete { background: none; border: none; color: var(--text-light); cursor: pointer; font-size: 1rem; padding: .2rem .5rem; border-radius: 4px; }
  .btn-case-delete:hover { background: var(--accent-light); color: var(--accent); }
  .btn-danger { background: var(--accent-light); color: var(--accent); border: 1.5px solid var(--accent); }
  .btn-danger:hover { background: #f9d6d0; }
  .btn-import { background: var(--card); color: var(--primary); border: 1.5px solid var(--primary); }
  .btn-import:hover { background: var(--primary-light); }
  .spacer { flex: 1; }

  /* ── iPad Optimizations ── */
  @media (pointer: coarse) {
    .btn { padding: .8rem 1.6rem; }
    tbody td { padding: .8rem .6rem; }
    tbody input, tbody select, .info-bar input, .info-bar select { padding: .7rem; font-size: 1rem; }
  }

  /* ── Toast ── */
  .toast {
    position: fixed; bottom: 1.5rem; left: 50%;
    transform: translateX(-50%) translateY(80px);
    background: var(--primary); color: #fff;
    padding: .65rem 1.3rem; border-radius: 8px;
    font-size: .85rem; font-weight: 500;
    opacity: 0; transition: all .3s ease; z-index: 100;
    pointer-events: none;
  }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
  .toast.error { background: var(--accent); }

  /* ── Summary cards ── */
  .section-title {
    font-family: 'Fraunces', serif;
    font-size: 1.15rem; color: var(--primary);
    margin: 2rem 0 .8rem; padding-bottom: .4rem;
    border-bottom: 2px solid var(--primary-light);
  }
  .summary-grid {
    display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
    gap: .75rem;
  }
  .summary-card {
    background: var(--card);
    border: 1.5px solid var(--border); border-radius: var(--radius);
    padding: .75rem 1rem; box-shadow: var(--shadow);
  }
  .summary-card h4 { font-size: .9rem; margin-bottom: .4rem; color: var(--primary); }
  .summary-card ul { list-style: none; }
  .summary-card li {
    font-size: .82rem; color: var(--text-light);
    padding: .2rem 0; border-bottom: 1px solid #f0ede8;
  }
  .summary-card li:last-child { border-bottom: none; }

  /* ── Print ── */
  @media print {
    body { background: #fff; padding: .5rem; }
    .actions, .info-bar, .toast, .api-badge, .btn-row-delete { display: none !important; }
    .table-wrap { box-shadow: none; border: 1px solid #ccc; }
    thead { -webkit-print-color-adjust: exact; print-color-adjust: exact; }
    .summary-card { break-inside: avoid; box-shadow: none; border: 1px solid #ccc; }
  }

  /* ── Responsive ── */
  @media (max-width: 640px) {
    .info-bar { flex-direction: column; }
    .actions { flex-direction: column; }
    .spacer { display: none; }
  }
</style>
</head>
<body>

<div class="container">
  <header>
    <h1>pHARe — Attribution des entretiens</h1>
    <p>Réunion avec la Direction</p>
    <span class="api-badge offline" id="api-status">⏳ Connexion…</span>
  </header>

  <!-- Liste des Cas -->
  <div id="cases-container" class="cases-list"></div>

  <!-- Boutons -->
  <div class="actions">
    <button class="btn btn-primary" onclick="addCase()">＋ Ajouter um Cas</button>
    <button class="btn btn-outline" onclick="saveAll()">💾 Enregistrer</button>
    <button class="btn btn-ghost" onclick="triggerImport()">📂 Importer JSON</button>
    <input type="file" id="import-file" style="display:none" accept=".json" onchange="processImport(event)">
    <button class="btn btn-ghost" onclick="exportJSON()">📄 Exporter JSON</button>
    <button class="btn btn-ghost" onclick="printReport()">🖨️ Imprimer</button>
    <button class="btn btn-danger" onclick="clearAll()" style="background:none; border:none; color:var(--accent); font-size:.8rem; cursor:pointer">🗑️ Tout effacer</button>
  </div>

  <!-- Résumé par membre -->
  <h2 class="section-title">Résumé par membre</h2>
  <div class="summary-grid" id="summary-grid"></div>
</div>

<div class="toast" id="toast"></div>

<script>
  // ══════════════════════════════════════════════════════
  //  CONFIGURATION
  // ══════════════════════════════════════════════════════

  const API_URL     = 'http://localhost:8080/api/cas';
  const STORAGE_KEY = 'phare_reunion';

  const MEMBRES = [
    '', 'Sammy K. Magbo', 'Anne-Marie L.', 'Bertrand P.',
    'Caroline D.', 'David M.', 'Élodie R.', 'François T.',
    'Gabrielle S.', 'Hugo V.', 'Isabelle C.', 'Julien B.',
    'Karine F.', 'Laurent N.', 'Marie-Claire A.'
  ];

  const TYPES = [
    { value: '', label: 'Choisir…' },
    { value: 'CIBLE',  label: '🔴 Cible (victime)' },
    { value: 'TEMOIN', label: '🟡 Témoin' },
    { value: 'PI',     label: '🟣 PI (intimidateur)' }
  ];

  // Mapping vers l'API existante
  const TYPE_TO_API = { CIBLE: 'VICTIME', TEMOIN: 'TEMOIN', PI: 'INTIMIDATEUR' };
  const TYPE_FROM_API = { VICTIME: 'CIBLE', TEMOIN: 'TEMOIN', INTIMIDATEUR: 'PI' };

  let rowCount = 0;
  let apiOnline = false;

  // ══════════════════════════════════════════════════════
  //  INIT
  // ══════════════════════════════════════════════════════

  (async function init() {
    const now = new Date();
    document.getElementById('reunion-date').value = now.toISOString().slice(0, 10);
    await loadData();
    if (document.querySelectorAll('#table-body tr:not(.empty-row)').length === 0) {
      for (let i = 0; i < 3; i++) addRow();
    }
    updateSummary();
  })();

  const API_URL     = 'http://localhost:8080/api/cas';
  const STORAGE_KEY = 'phare_reunion_v2'; 

  const MEMBRES = [
    '', 'Sammy K. Magbo', 'Anne-Marie L.', 'Bertrand P.',
    'Caroline D.', 'David M.', 'Élodie R.', 'François T.',
    'Gabrielle S.', 'Hugo V.', 'Isabelle C.', 'Julien B.',
    'Karine F.', 'Laurent N.', 'Marie-Claire A.'
  ];

  const TYPES = {
    CIBLE:  { label: '🔴 Cible', class: 'cible' },
    TEMOIN: { label: '🟡 Témoin', class: 'temoin' },
    PI:     { label: '🟣 PI', class: 'pi' }
  };

  const TYPE_MAP_API = { CIBLE: 'VICTIME', TEMOIN: 'TEMOIN', PI: 'INTIMIDATEUR' };

  let caseCount = 0;
  let apiOnline = false;

  (async function init() {
    await loadData();
    if (document.querySelectorAll('.case-card').length === 0) addCase();
    updateSummary();
  })();

  async function api(url, opts = {}) {
    try {
      const res = await fetch(url, { headers: { 'Content-Type': 'application/json' }, ...opts });
      apiOnline = true; showApiStatus(true);
      if (!res.ok) return null;
      return await res.json();
    } catch (e) {
      apiOnline = false; showApiStatus(false);
      return null;
    }
  }

  function showApiStatus(on) {
    const el = document.getElementById('api-status');
    if (el) {
      el.textContent = on ? '🟢 API connectée' : '🔴 Mode hors-ligne';
      el.className = 'api-badge ' + (on ? 'online' : 'offline');
    }
  }

  async function loadData() {
    const data = await api(API_URL);
    let cases = data && data.length > 0 ? data : JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]');
    cases.forEach(c => addCase(c));
  }

  function addCase(existingData = null) {
    caseCount++;
    const id = caseCount;
    const container = document.getElementById('cases-container');
    
    const card = document.createElement('div');
    card.className = 'case-card';
    card.id = `case-${id}`;

    const dateVal   = existingData?.date || new Date().toISOString().slice(0, 10);
    const classeVal = existingData?.classe || existingData?.eleves?.[0]?.classe || '';

    card.innerHTML = `
      <div class="case-header">
        <span class="case-title">📂 Cas #${id}</span>
        <div class="case-meta">
          <input type="text" placeholder="Classe" class="case-classe" value="${classeVal}">
          <input type="date" class="case-date" value="${dateVal}">
          <button class="btn-case-delete" onclick="deleteCase(${id})">✕</button>
        </div>
      </div>
      <div class="case-body" id="case-body-${id}"></div>
      <div style="display:flex; justify-content:center; gap:1rem; padding: 0.5rem 0;">
        <button class="btn-add-item" onclick="addStudentToCase(${id}, 'TEMOIN')">＋ Témoin</button>
        <button class="btn-add-item" onclick="addStudentToCase(${id}, 'PI')">＋ PI</button>
      </div>
    `;

    container.appendChild(card);

    if (existingData && existingData.eleves) {
      existingData.eleves.forEach(e => {
        let role = e.type;
        if (role === 'VICTIME') role = 'CIBLE';
        if (role === 'INTIMIDATEUR') role = 'PI';
        addStudentToCase(id, role, e);
      });
    } else {
      addStudentToCase(id, 'CIBLE');
      addStudentToCase(id, 'TEMOIN', { nom: 'Ex: témoin anonyme' });
      addStudentToCase(id, 'PI');
    }
  }

  function addStudentToCase(caseId, type, data = {}) {
    const body = document.getElementById(`case-body-${caseId}`);
    const row = document.createElement('div');
    row.className = `row-student ${type.toLowerCase()}`;
    row.dataset.type = type;

    const membreOpts = MEMBRES.map(m =>
      `<option value="${m}" ${data.membre === m ? 'selected' : ''}>${m || 'pHARe…'}</option>`
    ).join('');

    row.innerHTML = `
      <div class="type-badge badge-${type}">${TYPES[type].label}</div>
      <input type="text" placeholder="Nom de l'élève" class="f-nom" value="${data.nom || data.eleve || ''}">
      <select class="f-membre">${membreOpts}</select>
      <input type="date" class="f-date" value="${data.date || document.querySelector(`#case-${caseId} .case-date`).value}">
      <input type="time" class="f-heure" value="${data.heure || ''}">
      <button class="btn-case-delete" style="color:var(--accent)" onclick="this.closest('.row-student').remove(); updateSummary();">✕</button>
    `;
    body.appendChild(row);
    row.querySelectorAll('input, select').forEach(el => {
      el.addEventListener('change', updateSummary);
    });
    updateSummary();
  }

  function deleteCase(id) {
    if (confirm('Supprimer ce cas entier ?')) {
      document.getElementById(`case-${id}`).remove();
      updateSummary();
    }
  }

  function collectData() {
    const cards = document.querySelectorAll('.case-card');
    const cases = [];
    cards.forEach(card => {
      const date   = card.querySelector('.case-date').value;
      const classe = card.querySelector('.case-classe').value;
      const eleves = [];
      card.querySelectorAll('.row-student').forEach(row => {
        eleves.push({
          type: row.dataset.type,
          nom: row.querySelector('.f-nom').value,
          membre: row.querySelector('.f-membre').value,
          date: row.querySelector('.f-date').value,
          heure: row.querySelector('.f-heure').value
        });
      });
      cases.push({ date, classe, eleves });
    });
    return cases;
  }

  async function saveAll() {
    const cases = collectData();
    localStorage.setItem(STORAGE_KEY, JSON.stringify(cases));
    
    if (apiOnline) {
      for (const c of cases) {
        await api(API_URL, {
          method: 'POST',
          body: JSON.stringify({
            date: c.date,
            heure: '00:00',
            eleves: c.eleves.map(e => ({ ...e, type: TYPE_MAP_API[e.type] }))
          })
        });
      }
    }
    toast('Sauvegardé avec sucesso !');
  }

  function updateSummary() {
    const cases = collectData();
    const grid = document.getElementById('summary-grid');
    const byMember = {};

    cases.forEach(c => {
      c.eleves.forEach(e => {
        if (!e.membre || !e.nom) return;
        if (!byMember[e.membre]) byMember[e.membre] = [];
        byMember[e.membre].push({ ...e, classe: c.classe });
      });
    });

    if (Object.keys(byMember).length === 0) {
      grid.innerHTML = '<p style="color:var(--text-light);font-size:.85rem;font-style:italic">Aucune attribution en cours.</p>';
      return;
    }

    grid.innerHTML = Object.entries(byMember).map(([membre, rows]) => {
      const lis = rows.map(r => `
        <li>
          <strong>${r.nom}</strong> (${TYPES[r.type]?.label || r.type})
          <br><span style="font-size:.7rem; color:var(--text-light)">${r.classe} — ${r.date} ${r.heure}</span>
        </li>
      `).join('');
      return `<div class="summary-card"><h4>${membre} (${rows.length})</h4><ul>${lis}</ul></div>`;
    }).join('');
  }

  function exportJSON() {
    const data = collectData();
    const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = `phare_reunion_${new Date().toISOString().slice(0,10)}.json`;
    a.click();
    toast('Export JSON pronto.');
  }

  function triggerImport() { document.getElementById('import-file').click(); }
  function processImport(event) {
    const file = event.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = function(e) {
      try {
        const data = JSON.parse(e.target.result);
        document.getElementById('cases-container').innerHTML = '';
        caseCount = 0;
        data.forEach(c => addCase(c));
        toast('Dados importados com sucesso!');
      } catch (err) { toast('Arquivo inválido.', true); }
    };
    reader.readAsText(file);
  }

  function printReport() { window.print(); }
  function clearAll() { if (confirm('Tout effacer ?')) { document.getElementById('cases-container').innerHTML = ''; updateSummary(); } }
  function toast(msg, err = false) {
    const el = document.getElementById('toast');
    if (el) {
      el.textContent = msg; el.className = 'toast show' + (err ? ' error' : '');
      setTimeout(() => el.className = 'toast', 2500);
    }
  }
</script>
</body>
</html>
