<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>pHARe — Réunion & Attribution des entretiens</title>
<link rel="manifest" href="manifest.json">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<link rel="apple-touch-icon" href="icons/apple-touch-icon.png">
<meta name="theme-color" content="#0a2d1d">
<script type="module">
  import { checkAuth } from './js/auth.js';
  checkAuth();
</script>
<link rel="stylesheet" href="css/index.css">
<style>
  /* ── Page Specific Overrides ── */
  .planning-layout { display: flex; flex-direction: column; gap: 3rem; }
  
  .section-header {
    display: flex; align-items: center; justify-content: space-between;
    margin: 2rem 0 1.5rem; padding-bottom: 0.75rem;
    border-bottom: 2px solid var(--primary-light);
  }
  
  .cases-list { display: flex; flex-direction: column; gap: 1.5rem; }
  
  .case-card {
    border-left: 6px solid var(--primary);
  }
  
  .row-student {
    display: grid;
    grid-template-columns: 100px 1.5fr 1fr 140px 110px;
    gap: 1rem;
    padding: 1rem 1.5rem;
    align-items: center;
    border-bottom: 1px solid var(--border-color);
  }
  .row-student:last-child { border-bottom: none; }
  
  .row-student.victime { border-left: 4px solid var(--victime); }
  .row-student.temoin { border-left: 4px solid var(--temoin); }
  .row-student.intimidateur { border-left: 4px solid var(--intimidateur); }

  .case-group-card { margin-bottom: 1.5rem; }
  
  .case-student-row {
    display: grid; 
    grid-template-columns: 95px 1.5fr 1fr 1fr auto;
    gap: 1rem; padding: 1rem 1.5rem;
    border-bottom: 1px solid var(--border-color);
  }
  .case-student-row:last-child { border-bottom: none; }

  .actions-fixed {
    position: sticky; bottom: 2rem;
    display: flex; justify-content: center; gap: 0.75rem;
    margin-top: 3rem; padding: 1.5rem;
    z-index: 100;
  }
</style>
</head>
<body>

<div class="container animate-reveal">
  <!-- Navigation -->
  <nav class="top-nav glass">
    <a class="nav-link" href="phare-gestion-harcelement.html">📋 Gestion</a>
    <a class="nav-link active" href="phare-reunion.html">📅 Réunion</a>
    <a class="nav-link" href="#" id="logout-btn">🚪 Déconnexion</a>
  </nav>

  <script type="module">
    import { logoutUser } from './js/auth.js';
    document.getElementById('logout-btn').addEventListener('click', (e) => {
      e.preventDefault();
      logoutUser();
    });
  </script>

  <header>
    <h1>Réunion pHARe</h1>
    <p>Attribution et planification des entretiens</p>
    <div id="api-status-container">
        <span class="badge api-badge offline" id="api-status">⏳ Connexion…</span>
    </div>
  </header>

  <div class="planning-layout">
    <!-- À PLANIFIER -->
    <section id="pending-section">
      <div class="section-header">
        <h2 style="color: var(--primary);">📑 Entretiens à planifier</h2>
        <div id="stats-bar" style="display: flex; gap: 0.5rem; flex-wrap: wrap;"></div>
      </div>
      <div id="cases-container" class="cases-list"></div>
    </section>

    <!-- PLANIFIÉS -->
    <section id="scheduled-section" style="display:none">
      <div class="section-header">
        <h2 style="color: var(--primary);">📋 Planning des Entretiens</h2>
      </div>
      <div id="scheduled-grid" class="history-list"></div>
    </section>
  </div>

  <!-- Boutons -->
  <div class="actions-fixed glass" id="actions-bar" style="display:none">
    <button class="btn btn-primary" onclick="saveAll()">💾 Enregistrer tout</button>
    <button class="btn btn-ghost" onclick="openMemberManager()">👥 Équipe</button>
    <button class="btn btn-ghost" onclick="exportJSON()">📄 Exporter</button>
    <button class="btn btn-ghost" onclick="printReport()">🖨️ Imprimer</button>
  </div>
</div>

<div class="toast" id="toast"></div>

<!-- Modal Membres -->
<div class="modal-overlay" id="member-modal" onclick="if(event.target===this) closeMemberManager()">
  <div class="card" style="width: 100%; max-width: 450px; padding: 2rem;">
    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 2rem;">
      <h2 style="color: var(--primary);">Équipe pHARe</h2>
      <button class="btn" onclick="closeMemberManager()" style="background: none; font-size: 1.5rem;">✕</button>
    </div>
    <div class="field-group">
      <div style="display: flex; gap: 0.5rem;">
        <input type="text" id="new-member-name" placeholder="Nom du membre…">
        <button class="btn btn-primary" onclick="addMemberToList()">Ajouter</button>
      </div>
    </div>
    <div id="member-list-items" style="max-height: 300px; overflow-y: auto; display: flex; flex-direction: column; gap: 0.5rem;"></div>
  </div>
</div>

<!-- Custom Modal -->
<div class="modal-overlay" id="custom-modal">
  <div class="card" style="width: 100%; max-width: 400px; padding: 2rem;">
    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.5rem;">
      <h2 id="custom-modal-title" style="color: var(--primary);">Action</h2>
      <button class="btn" onclick="closeCustomModal()" style="background: none; font-size: 1.5rem;">✕</button>
    </div>
    <div style="display: flex; flex-direction: column; gap: 1rem;">
      <p id="custom-modal-msg"></p>
      <input type="text" id="custom-modal-input" placeholder="Nom de l'élève" style="display: none;">
      <input type="text" id="custom-modal-input-2" placeholder="Classe (ex: 6ème A)" style="display: none;">
      <select id="custom-modal-select" style="display: none;"></select>
      <div style="display: flex; gap: 0.5rem; justify-content: flex-end; margin-top: 1rem;">
        <button class="btn btn-ghost" onclick="closeCustomModal()">Annuler</button>
        <button class="btn btn-primary" id="custom-modal-confirm">Confirmer</button>
      </div>
    </div>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
<script type="module">
  import { getScheduledEntretiens, getPendingEntretiens, scheduleEntretien, cancelEntretien, saveReunionLocal, loadReunionLocal } from './js/entretien-api.js';
  import { fetchApi } from './js/api.js';

  const CASES_KEY    = 'phare_cases';
  const MEMBERS_KEY  = 'phare_members';

  let apiOnline = false;
  const HOSTNAME = window.location.hostname || 'localhost';
  const API_URL = `http://${HOSTNAME}:8080/api/cas`;

  let MEMBRES = [];
  const DEFAULT_MEMBRES = [
    'Antoine Kopp', 'Aline Soulhat', 'Alex Sarno', 'Ana Maria Sezerino', 'Céline Berger',
    'Daiana Santos', 'Élodie Mazet', 'Giselle Paz', 'Jonathan Wasato', 'Maria Beatriz Guimarães',
    'Rafaela Lomba', 'Vanessa Coelho', 'Vanessa Laga', 'Whilian Xavier'
  ];

  const TYPE_DISPLAY = {
    VICTIME: { icon: '🔴', label: 'Victime', class: 'victime' },
    TEMOIN:  { icon: '🟡', label: 'Témoin',  class: 'temoin' },
    INTIMIDATEUR: { icon: '🟣', label: 'Intimidateur', class: 'intimidateur' },
    victime: { icon: '🔴', label: 'Victime', class: 'victime' },
    temoin:  { icon: '🟡', label: 'Témoin',  class: 'temoin' },
    intimidateur: { icon: '🟣', label: 'Intimidateur', class: 'intimidateur' }
  };

  let allCases = [];
  let reunionData = {};

  (async function init() {
    loadMembers();
    try {
      const data = await fetchApi(API_URL);
      apiOnline = true;
      allCases = data;
      localStorage.setItem(CASES_KEY, JSON.stringify(data));
    } catch (err) {
      console.warn('API Offline — using localStorage');
      apiOnline = false;
      allCases = JSON.parse(localStorage.getItem(CASES_KEY) || '[]');
    }

    reunionData = loadReunionLocal();
    updateApiBadge();
    renderAll();

    const params = new URLSearchParams(window.location.search);
    const targetCaseId = params.get('cas');
    if (targetCaseId) {
      setTimeout(() => {
        const el = document.getElementById(`case-${targetCaseId}`);
        if (el) {
          el.scrollIntoView({ behavior: 'smooth', block: 'center' });
          gsap.from(el, { backgroundColor: 'var(--primary-light)', duration: 1 });
        }
      }, 500);
    }
  })();

  function updateApiBadge() {
    const badge = document.getElementById('api-status');
    if (!badge) return;
    badge.textContent = apiOnline ? '🟢 API connectée' : '🔴 Mode hors-ligne';
    badge.className = 'badge api-badge ' + (apiOnline ? 'online' : 'offline');
  }

  function renderAll() {
    renderStats();
    renderCases();
    updateSummary();
  }

  function renderStats() {
    const bar = document.getElementById('stats-bar');
    if (allCases.length === 0) { bar.innerHTML = ''; return; }

    const totalStudents = allCases.reduce((s, c) => s + (c.eleves?.length || 0), 0);
    let scheduled = 0;
    allCases.forEach(c => {
      const rd = reunionData[c.id]?.entretiens || {};
      (c.eleves || []).forEach((_, i) => {
        if (rd[i]?.date && rd[i]?.membre) scheduled++;
      });
    });

    bar.innerHTML = `
      <span class="badge">📂 ${allCases.length} cas</span>
      <span class="badge">👤 ${totalStudents} élèves</span>
      <span class="badge" style="background: var(--primary); color: #fff;">✅ ${scheduled} planifiés</span>
    `;
  }

  function renderCases() {
    const container = document.getElementById('cases-container');
    const actionsBar = document.getElementById('actions-bar');
    const scheduledSection = document.getElementById('scheduled-section');

    const casesToRender = allCases.filter(cas => {
      const rd = reunionData[cas.id]?.entretiens || {};
      return (cas.eleves || []).some((_, i) => !rd[i]?.membre || !rd[i]?.date);
    });

    if (allCases.length === 0) {
      container.innerHTML = `<div class="card" style="text-align: center; padding: 4rem;">
        <h2 style="color: var(--text-muted);">Aucun cas enregistré</h2>
        <a href="phare-gestion-harcelement.html" class="btn btn-primary" style="margin-top: 1rem;">＋ Créer un cas</a>
      </div>`;
      actionsBar.style.display = 'none';
      return;
    }

    actionsBar.style.display = 'flex';
    
    if (casesToRender.length === 0) {
      container.innerHTML = `<div class="card" style="text-align: center; background: var(--primary-light); border-color: var(--primary);">
        <h3 style="color: var(--primary);">Tous les entretiens sont planifiés !</h3>
      </div>`;
    } else {
      container.innerHTML = casesToRender.map(c => {
        const rd = reunionData[c.id]?.entretiens || {};
        const pendingStudents = (c.eleves || []).map((e, i) => ({ e, i }))
          .filter(p => !rd[p.i]?.membre || !rd[p.i]?.date);

        return `
          <div class="card case-card" id="case-${c.id}">
            <div style="padding: 1rem 1.5rem; background: var(--bg); border-bottom: 1px solid var(--border-color); display: flex; justify-content: space-between;">
              <span style="font-weight: 700; color: var(--primary);">📂 Dossier du ${formatDate(c.date)}</span>
              <span class="badge">${pendingStudents.length} en attente</span>
            </div>
            ${pendingStudents.map(p => {
              const td = TYPE_DISPLAY[p.e.type] || { icon: '❓', label: p.e.type, class: '' };
              const ent = rd[p.i] || {};
              return `
                <div class="row-student ${td.class}">
                  <span class="badge" style="background: currentColor; color: #fff; width: fit-content;">${td.label}</span>
                  <div style="font-weight: 700;">${p.e.nom} <span style="font-weight: 400; opacity: 0.7;">(${p.e.classe || '?'})</span></div>
                  <select onchange="window.onFieldChange(this)" data-case="${c.id}" data-idx="${p.i}" class="f-membre">
                    <option value="">Intervenant...</option>
                    ${MEMBRES.map(m => `<option value="${m}" ${ent.membre === m ? 'selected' : ''}>${m}</option>`).join('')}
                  </select>
                  <input type="date" value="${ent.date || ''}" onchange="window.onFieldChange(this)" data-case="${c.id}" data-idx="${p.i}" class="f-date">
                  <input type="time" value="${ent.heure || ''}" onchange="window.onFieldChange(this)" data-case="${c.id}" data-idx="${p.i}" class="f-heure">
                </div>
              `;
            }).join('')}
          </div>
        `;
      }).join('');
    }
  }

  function updateSummary() {
    const container = document.getElementById('scheduled-grid');
    const section = document.getElementById('scheduled-section');
    
    const casesWithScheduled = allCases.filter(cas => {
        const rd = reunionData[cas.id]?.entretiens || {};
        return Object.values(rd).some(e => e.membre && e.date);
    });

    if (casesWithScheduled.length === 0) {
      section.style.display = 'none';
      return;
    }

    section.style.display = 'block';
    container.innerHTML = casesWithScheduled.map(c => {
      const rd = reunionData[c.id]?.entretiens || {};
      const scheduledOnes = (c.eleves || []).map((e, i) => ({ e, i }))
        .filter(p => rd[p.i]?.membre && rd[p.i]?.date);

      return `
        <div class="card case-group-card">
          <div style="padding: 1rem 1.5rem; background: var(--primary-light); color: var(--primary); font-weight: 700;">
            📅 Planning — Incident du ${formatDate(c.date)}
          </div>
          ${scheduledOnes.map(p => {
            const ent = rd[p.i];
            const td = TYPE_DISPLAY[p.e.type] || { icon: '❓', label: p.e.type, class: '' };
            return `
              <div class="case-student-row ${td.class}">
                <span class="badge">${td.label}</span>
                <div style="font-weight: 700;">${p.e.nom}</div>
                <div style="color: var(--primary); font-weight: 600;">👤 ${ent.membre}</div>
                <div>🕒 ${formatDate(ent.date)} à ${ent.heure || '?'}</div>
                <button class="btn" style="color: var(--accent);" onclick="window.unplan(${c.id}, ${p.i})">✕</button>
              </div>
            `;
          }).join('')}
        </div>
      `;
    }).join('');
  }

  window.onFieldChange = function(el) {
    const caseId = el.dataset.case;
    const idx = parseInt(el.dataset.idx);
    const field = el.classList.contains('f-membre') ? 'membre' : 
                  el.classList.contains('f-date') ? 'date' : 'heure';
    
    if (!reunionData[caseId]) reunionData[caseId] = { entretiens: {} };
    if (!reunionData[caseId].entretiens[idx]) reunionData[caseId].entretiens[idx] = {};
    
    reunionData[caseId].entretiens[idx][field] = el.value;
    saveReunionLocal(reunionData);
    
    // Auto-refresh when fully scheduled
    const ent = reunionData[caseId].entretiens[idx];
    if (ent.membre && ent.date) {
        gsap.to(el.closest('.row-student'), { x: 50, opacity: 0, duration: 0.5, onComplete: renderAll });
    }
  };

  window.unplan = function(caseId, idx) {
    if (confirm('Désannuler cet entretien ?')) {
        delete reunionData[caseId].entretiens[idx];
        saveReunionLocal(reunionData);
        renderAll();
    }
  };

  window.saveAll = function() {
    showToast('✅ Modifications enregistrées localement');
    renderAll();
  };

  function loadMembers() {
    const saved = localStorage.getItem(MEMBERS_KEY);
    MEMBRES = saved ? JSON.parse(saved) : DEFAULT_MEMBRES;
  }

  window.openMemberManager = function() {
    const container = document.getElementById('member-list-items');
    container.innerHTML = MEMBRES.map(m => `
      <div class="card" style="padding: 0.75rem 1rem; flex-direction: row; justify-content: space-between; align-items: center;">
        <span>${m}</span>
        <button onclick="window.removeMember('${m}')" style="color: var(--accent); background: none; border: none; cursor: pointer;">✕</button>
      </div>
    `).join('');
    document.getElementById('member-modal').classList.add('active');
  };

  window.closeMemberManager = () => document.getElementById('member-modal').classList.remove('active');

  window.addMemberToList = function() {
    const input = document.getElementById('new-member-name');
    const name = input.value.trim();
    if (name && !MEMBRES.includes(name)) {
      MEMBRES.push(name);
      MEMBRES.sort();
      localStorage.setItem(MEMBERS_KEY, JSON.stringify(MEMBRES));
      input.value = '';
      openMemberManager();
      renderCases();
    }
  };

  window.removeMember = function(name) {
    MEMBRES = MEMBRES.filter(m => m !== name);
    localStorage.setItem(MEMBERS_KEY, JSON.stringify(MEMBRES));
    openMemberManager();
    renderCases();
  };

  function formatDate(d) {
    if (!d) return '?';
    const [y, m, day] = d.split('-');
    return `${day}/${m}/${y}`;
  }

  function showToast(msg, isError = false) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.className = 'toast ' + (isError ? 'error ' : '') + 'show';
    setTimeout(() => t.classList.remove('show'), 3000);
  }

  window.exportJSON = () => {
    const blob = new Blob([JSON.stringify({ cases: allCases, planning: reunionData }, null, 2)], { type: 'application/json' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = `phare-export-${new Date().toISOString().split('T')[0]}.json`;
    a.click();
  };

  window.printReport = () => window.print();

</script>
</body>
</html>
