# ═══════════════════════════════════════════════
#  pHARe API — Configuration PostgreSQL
# ═══════════════════════════════════════════════

server.port=8080
spring.application.name=phare-api

# ── PostgreSQL ──
spring.datasource.url=jdbc:postgresql://localhost:5432/phare_db
spring.datasource.username=phare_user
spring.datasource.password=phare_password
spring.datasource.driver-class-name=org.postgresql.Driver

# ── JPA / Hibernate ──
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true

# ── Gestion des relations JSON (éviter les boucles) ──
spring.jackson.serialization.FAIL_ON_EMPTY_BEANS=false
